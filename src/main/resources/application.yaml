spring:
  application:
    name: college-help-desk

  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: http://localhost:11434

      chat:
        options:
          model: qwen:4b

      embedding:
        options:
          model: nomic-embed-text

    retry:
      max-attempts: 10

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration

elasticsearch:
  host: ${DOCKER_ELASTICSEARCH_HOST:localhost}
  port: 9200

embedding:
  dimensions: 768

conversation:
  memory:
    max-size: 10

vector-cache:
  similarity_threshold: 0.95

vector-database:
  top-k: 2
  similarity-threshold: 0.6

redis:
  host: localhost
  port: 6379

chat-history:
  max-messages: 5